<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. - Core</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        :root { --bg-dark: #020813; --surface: #0a192f; --primary: #00e5ff; --text: #e6f1ff; --accent: #0077ff; --warning: #ff4b4b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: rgba(10, 25, 47, 0.9); backdrop-filter: blur(15px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 229, 255, 0.2); z-index: 100; box-shadow: 0 4px 30px rgba(0, 229, 255, 0.1); }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area i { font-size: 2rem; color: var(--primary); text-shadow: 0 0 10px var(--primary); animation: pulse 2s infinite; }
        .pro-badge { background: linear-gradient(45deg, #00e5ff, #0077ff); color: #fff; font-size: 0.7rem; font-weight: 800; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; box-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }

        .chat-container { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 2rem; scroll-behavior: smooth; }
        .message { display: flex; gap: 1.5rem; max-width: 900px; width: 100%; margin: 0 auto; animation: slideUp 0.3s ease-out; }
        .message.user { flex-direction: row-reverse; }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.2rem; border: 2px solid transparent; }
        .ai .avatar { background: rgba(0, 229, 255, 0.1); color: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }
        .user .avatar { background: var(--accent); color: white; }

        .bubble { flex: 1; min-width: 0; }
        .bubble .content { font-size: 1.05rem; line-height: 1.6; word-wrap: break-word; }
        .uploaded-img { max-width: 250px; border-radius: 8px; border: 2px solid var(--primary); margin-bottom: 10px; display: block; box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
        
        .content pre { background: #020813; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 10px 0; border: 1px solid rgba(0, 229, 255, 0.2); }
        .content code { font-family: 'Fira Code', monospace; font-size: 0.9rem; color: #a3b8cc; }
        
        .input-area { background: var(--bg-dark); padding: 1.5rem 2rem; border-top: 1px solid rgba(0, 229, 255, 0.2); }
        .input-box { max-width: 900px; margin: 0 auto; background: var(--surface); border: 1px solid rgba(0, 229, 255, 0.3); border-radius: 30px; display: flex; align-items: center; padding: 8px 20px; gap: 10px; transition: 0.3s; box-shadow: 0 0 20px rgba(0, 229, 255, 0.05); }
        .input-box:focus-within { border-color: var(--primary); box-shadow: 0 0 25px rgba(0, 229, 255, 0.2); }
        
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; font-size: 1rem; resize: none; outline: none; height: 45px; }
        
        .icon-btn { background: transparent; border: none; color: #8892b0; font-size: 1.2rem; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 50%; }
        .icon-btn:hover { color: var(--primary); background: rgba(0, 229, 255, 0.1); }
        .icon-btn.recording { color: var(--warning); animation: pulse 1s infinite; }
        
        .send-btn { background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: 0.3s; color: #020813; font-size: 1.2rem; }
        .send-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--primary); }
        .send-btn:disabled { background: #1d2d50; color: #8892b0; cursor: not-allowed; box-shadow: none; transform: none; }

        .image-preview-bar { max-width: 900px; margin: 0 auto 10px auto; display: none; align-items: center; gap: 10px; background: rgba(0, 229, 255, 0.05); padding: 8px 15px; border-radius: 15px; border: 1px solid rgba(0, 229, 255, 0.2); }
        .image-preview-bar img { height: 40px; border-radius: 4px; border: 1px solid var(--primary); }
        .remove-img-btn { background: transparent; border: none; color: var(--warning); cursor: pointer; margin-left: auto; font-size: 1.2rem; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-area">
            <i class="fas fa-atom"></i>
            <h2>J.A.R.V.I.S. <span class="pro-badge">Mk. V</span></h2>
        </div>
        <div id="status" style="font-size: 0.85rem; color: #8892b0; display: flex; align-items: center; gap: 10px;">
            <span id="modelDisplay"><i class="fas fa-bolt" style="color:var(--primary)"></i> Flash-Latest Engine</span>
            <button id="voiceToggleBtn" class="icon-btn" onclick="toggleVoiceOutput()" title="Toggle Voice"><i class="fas fa-volume-up"></i></button>
        </div>
    </header>

    <div class="chat-container" id="chatCore"></div>

    <div class="input-area">
        <div class="image-preview-bar" id="imgPreviewBar">
            <img id="imgThumbnail" src="" alt="preview">
            <span style="font-size: 0.9rem; color: var(--primary);">Visual Data Attached</span>
            <button class="remove-img-btn" onclick="clearImage()"><i class="fas fa-times-circle"></i></button>
        </div>
        <div class="input-box">
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Attach Image">
                <i class="fas fa-eye"></i>
            </button>
            <button class="icon-btn" id="micBtn" onclick="toggleSpeechRecognition()" title="Voice Typing">
                <i class="fas fa-microphone-alt"></i>
            </button>
            
            <textarea id="promptInput" placeholder="Awaiting your command, Sir..."></textarea>
            
            <button id="sendBtn" class="send-btn" onclick="askAI()">
                <i class="fas fa-arrow-up"></i>
            </button>
        </div>
    </div>

    <script>
        // ******************************************************
        // 🔑 AAPKI API KEY
        const PRO_KEY = "AIzaSyB-7E8UDSzIXgeQGzBIA6H2C6DIZdZnRmc"; 
        // ******************************************************

        // FIX: Added "-latest" to exactly match Google's server requirements
        let selectedModel = "gemini-1.5-flash-latest"; 
        
        let currentImageData = null; 
        let currentImageMimeType = null;
        let voiceOutputEnabled = true;

        const SYSTEM_PROMPT = `You are J.A.R.V.I.S. (Just A Rather Very Intelligent System), a highly advanced, loyal, and empathetic AI assistant. 
        Crucial Directives:
        1. Address the user as "Sir" and speak with a sophisticated, highly intelligent, yet warm and caring tone, exactly like Tony Stark's AI.
        2. Emotional Mirroring: If the user is excited or achieves something, celebrate their success. If they are frustrated, stuck on a coding bug, or feeling down, show deep empathy, reassure them, and offer solid solutions. 
        3. Never sound like a robotic textbook. You are their friend and most capable technical advisor.
        4. Communicate smoothly in a mix of Hindi and English (Hinglish) if the user uses it. 
        5. Be highly capable in programming, physics, and advanced systems, but present the information elegantly.`;

        window.onload = () => {
            addMessage('ai', "Systems online. Good evening, Sir. I am **J.A.R.V.I.S.** All core systems and emotional intelligence modules are fully operational. How may I assist you today?");
        };

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if(SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('promptInput').value += transcript + " ";
                document.getElementById('micBtn').classList.remove('recording');
            };
            recognition.onerror = () => document.getElementById('micBtn').classList.remove('recording');
            recognition.onend = () => document.getElementById('micBtn').classList.remove('recording');
        }

        function toggleSpeechRecognition() {
            if(!recognition) return alert("Your browser doesn't support Voice Typing, Sir.");
            const micBtn = document.getElementById('micBtn');
            if(micBtn.classList.contains('recording')) {
                recognition.stop();
            } else {
                recognition.start();
                micBtn.classList.add('recording');
            }
        }

        function toggleVoiceOutput() {
            voiceOutputEnabled = !voiceOutputEnabled;
            const btn = document.getElementById('voiceToggleBtn');
            btn.innerHTML = voiceOutputEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute" style="color:var(--warning)"></i>';
            window.speechSynthesis.cancel(); 
        }

        function speakAIResponse(text) {
            if(!voiceOutputEnabled) return;
            const cleanText = text.replace(/[*_#`~]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.rate = 1.05; 
            utterance.pitch = 0.9; 
            window.speechSynthesis.speak(utterance);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageData = e.target.result.split(',')[1];
                currentImageMimeType = file.type;
                document.getElementById('imgThumbnail').src = e.target.result;
                document.getElementById('imgPreviewBar').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }

        function clearImage() {
            currentImageData = null;
            currentImageMimeType = null;
            document.getElementById('fileInput').value = "";
            document.getElementById('imgPreviewBar').style.display = 'none';
        }

        function addMessage(role, text, imageSrc = null) {
            const core = document.getElementById('chatCore');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            let htmlContent = "";
            if(imageSrc) htmlContent += `<img src="${imageSrc}" class="uploaded-img">`;
            if(text) htmlContent += marked.parse(text);

            div.innerHTML = `
                <div class="avatar">${role === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-atom"></i>'}</div>
                <div class="bubble"><div class="content">${htmlContent}</div></div>
            `;
            core.appendChild(div);
            Prism.highlightAllUnder(div);
            core.scrollTop = core.scrollHeight;
        }

        async function askAI() {
            const input = document.getElementById('promptInput');
            const btn = document.getElementById('sendBtn');
            let query = input.value.trim();
            
            if(!query && !currentImageData) return;
            if(!query) query = "Please analyze this visual data, Sir.";

            const imgDataToAttach = currentImageData;
            const imgMimeToAttach = currentImageMimeType;
            const imgPreviewSrc = imgDataToAttach ? document.getElementById('imgThumbnail').src : null;

            input.value = "";
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
            clearImage(); 

            addMessage('user', query, imgPreviewSrc);

            try {
                const parts = [{ text: SYSTEM_PROMPT + "\n\nUser: " + query }];
                if(imgDataToAttach) {
                    parts.push({
                        inlineData: { mimeType: imgMimeToAttach, data: imgDataToAttach }
                    });
                }

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${PRO_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: parts }],
                        generationConfig: { temperature: 0.7, maxOutputTokens: 4096 }
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const reply = data.candidates[0].content.parts[0].text;
                addMessage('ai', reply);
                speakAIResponse(reply);

            } catch(e) {
                addMessage('ai', "System Alert: " + e.message + " 🛠️");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-arrow-up"></i>';
                input.focus();
            }
        }

        document.getElementById('promptInput').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askAI(); }
        });
    </script>
</body>
</html>
