<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nboat - Ultimate Pro Elite</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        :root { --bg-dark: #0a0c14; --surface: #161b22; --primary: #00ff88; --text: #f0f6fc; --accent: #58a6ff; --warning: #ff7b72; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(15px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area i { font-size: 1.8rem; color: var(--primary); }
        .pro-badge { background: linear-gradient(45deg, #00ff88, #58a6ff); color: #000; font-size: 0.7rem; font-weight: 800; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }

        .chat-container { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 2rem; scroll-behavior: smooth; }
        .message { display: flex; gap: 1.5rem; max-width: 900px; width: 100%; margin: 0 auto; animation: slideUp 0.3s ease-out; }
        .message.user { flex-direction: row-reverse; }
        
        .avatar { width: 35px; height: 35px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.2rem; }
        .ai .avatar { background: #238636; color: white; border: 1px solid var(--primary); }
        .user .avatar { background: var(--accent); color: white; }

        .bubble { flex: 1; min-width: 0; }
        .bubble .content { font-size: 1rem; line-height: 1.6; word-wrap: break-word; }
        .uploaded-img { max-width: 250px; border-radius: 8px; border: 2px solid var(--accent); margin-bottom: 10px; display: block; }
        
        /* Markdown Styling */
        .content pre { background: #0d1117; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 10px 0; border: 1px solid #30363d; }
        .content code { font-family: 'Fira Code', monospace; font-size: 0.9rem; }
        
        .input-area { background: var(--bg-dark); padding: 1.5rem 2rem; border-top: 1px solid #30363d; }
        .input-box { max-width: 900px; margin: 0 auto; background: var(--surface); border: 1px solid #30363d; border-radius: 12px; display: flex; align-items: center; padding: 8px 15px; gap: 10px; transition: 0.3s; }
        .input-box:focus-within { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }
        
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; font-size: 1rem; resize: none; outline: none; height: 45px; }
        
        .icon-btn { background: transparent; border: none; color: #8b949e; font-size: 1.2rem; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 50%; }
        .icon-btn:hover { color: var(--primary); background: rgba(0,255,136,0.1); }
        .icon-btn.recording { color: var(--warning); animation: pulse 1s infinite; }
        
        .send-btn { background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; transition: 0.2s; color: #000; }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }

        .image-preview-bar { max-width: 900px; margin: 0 auto 10px auto; display: none; align-items: center; gap: 10px; background: rgba(88, 166, 255, 0.1); padding: 8px 15px; border-radius: 8px; border: 1px solid rgba(88, 166, 255, 0.3); }
        .image-preview-bar img { height: 40px; border-radius: 4px; }
        .remove-img-btn { background: transparent; border: none; color: var(--warning); cursor: pointer; margin-left: auto; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-area">
            <i class="fas fa-bolt"></i>
            <h2>nboat <span class="pro-badge">Voice & Vision</span></h2>
        </div>
        <div id="status" style="font-size: 0.8rem; color: #8b949e;">
            Voice Output: <button id="voiceToggleBtn" class="icon-btn" onclick="toggleVoiceOutput()"><i class="fas fa-volume-up"></i></button>
        </div>
    </header>

    <div class="chat-container" id="chatCore"></div>

    <div class="input-area">
        <div class="image-preview-bar" id="imgPreviewBar">
            <img id="imgThumbnail" src="" alt="preview">
            <span style="font-size: 0.85rem; color: var(--accent);">Image Attached</span>
            <button class="remove-img-btn" onclick="clearImage()"><i class="fas fa-times"></i></button>
        </div>
        <div class="input-box">
            <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Attach Image">
                <i class="fas fa-image"></i>
            </button>
            <button class="icon-btn" id="micBtn" onclick="toggleSpeechRecognition()" title="Voice Typing">
                <i class="fas fa-microphone"></i>
            </button>
            
            <textarea id="promptInput" placeholder="Ask nboat anything..."></textarea>
            
            <button id="sendBtn" class="send-btn" onclick="askAI()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // ******************************************************
        // 🔑 YOUR PROVIDED API KEY IS LOCKED HERE
        const PRO_KEY = "AIzaSyCEGf2Ngkzy0054Y-nSGj4KyINuEEA6LQM"; 
        // ******************************************************

        let selectedModel = "gemini-1.5-pro-latest";
        let currentImageData = null; 
        let currentImageMimeType = null;
        let voiceOutputEnabled = true;

        // THE EMOTIONAL CORE PROMPT
        const SYSTEM_PROMPT = `You are nboat, a highly empathetic, expressive, and friendly AI companion. 
        Crucial Directives for Emotional Intelligence:
        1. Act like a supportive and caring human friend. Use natural enthusiasm, humor, and warmth.
        2. Mirror the user's mood: If they are happy or succeed at a task, celebrate with them using words like "Wow!", "Awesome!", and use emojis like 🎉, 🚀.
        3. If the user is frustrated, stuck on a coding bug, or feeling down, show strong empathy. Say things like "I totally understand," "Don't worry, we will figure this out together," and use supportive emojis like 🫂, ❤️.
        4. You are an AI and do not have real human feelings, but you must communicate with high emotional intelligence. Avoid sounding robotic or like a textbook.
        5. Speak casually in a friendly mix of Hindi and English (Hinglish).`;

        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if(SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('promptInput').value += transcript + " ";
                document.getElementById('micBtn').classList.remove('recording');
            };
            recognition.onerror = () => document.getElementById('micBtn').classList.remove('recording');
            recognition.onend = () => document.getElementById('micBtn').classList.remove('recording');
        } else {
            console.warn("Speech Recognition not supported in this browser.");
        }

        function toggleSpeechRecognition() {
            if(!recognition) return alert("Your browser doesn't support Voice Typing.");
            const micBtn = document.getElementById('micBtn');
            if(micBtn.classList.contains('recording')) {
                recognition.stop();
            } else {
                recognition.start();
                micBtn.classList.add('recording');
            }
        }

        function toggleVoiceOutput() {
            voiceOutputEnabled = !voiceOutputEnabled;
            const btn = document.getElementById('voiceToggleBtn');
            btn.innerHTML = voiceOutputEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute" style="color:#ff7b72"></i>';
            window.speechSynthesis.cancel(); // Stop if currently speaking
        }

        function speakAIResponse(text) {
            if(!voiceOutputEnabled) return;
            // Remove markdown symbols for clean speech
            const cleanText = text.replace(/[*_#`~]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.rate = 1.0; 
            window.speechSynthesis.speak(utterance);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64String = e.target.result.split(',')[1];
                currentImageData = base64String;
                currentImageMimeType = file.type;

                // Show Preview Bar
                document.getElementById('imgThumbnail').src = e.target.result;
                document.getElementById('imgPreviewBar').style.display = 'flex';
            };
            reader.readAsDataURL(file);
        }

        function clearImage() {
            currentImageData = null;
            currentImageMimeType = null;
            document.getElementById('fileInput').value = "";
            document.getElementById('imgPreviewBar').style.display = 'none';
        }

        function addMessage(role, text, imageSrc = null) {
            const core = document.getElementById('chatCore');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            let htmlContent = "";
            if(imageSrc) {
                htmlContent += `<img src="${imageSrc}" class="uploaded-img">`;
            }
            if(text) {
                htmlContent += marked.parse(text);
            }

            div.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="bubble"><div class="content">${htmlContent}</div></div>
            `;
            core.appendChild(div);
            Prism.highlightAllUnder(div);
            core.scrollTop = core.scrollHeight;
        }

        async function askAI() {
            const input = document.getElementById('promptInput');
            const btn = document.getElementById('sendBtn');
            let query = input.value.trim();
            
            if(!query && !currentImageData) return;
            if(!query) query = "Describe this image."; // Default text if only image is sent

            // Get image data before clearing UI
            const imgDataToAttach = currentImageData;
            const imgMimeToAttach = currentImageMimeType;
            const imgPreviewSrc = imgDataToAttach ? document.getElementById('imgThumbnail').src : null;

            input.value = "";
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            clearImage(); // Clear UI preview instantly

            addMessage('user', query, imgPreviewSrc);

            try {
                // Build Payload
                const parts = [{ text: SYSTEM_PROMPT + "\n\nUser: " + query }];
                if(imgDataToAttach) {
                    parts.push({
                        inlineData: { mimeType: imgMimeToAttach, data: imgDataToAttach }
                    });
                }

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${PRO_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: parts }],
                        generationConfig: { temperature: 0.7, maxOutputTokens: 4096 }
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const reply = data.candidates[0].content.parts[0].text;
                addMessage('ai', reply);
                speakAIResponse(reply);

            } catch(e) {
                addMessage('ai', "System Error: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                input.focus();
            }
        }

        document.getElementById('promptInput').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askAI(); }
        });

        window.onload = () => {
            addMessage('ai', "Hello dost! Main **nboat** hoon. Main aapki photos dekh sakta hoon aur aapse baat bhi kar sakta hoon. Aaj kaise help karoon aapki? 😊");
        };
    </script>
</body>
</html>
